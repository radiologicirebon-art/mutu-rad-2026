<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audit Mutu Radiologi PRO 2.2</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#f4f6f9}
.sidebar{position:fixed;width:230px;height:100%;background:#1e293b;color:white;padding:20px}
.sidebar h2{color:#38bdf8}
.sidebar button{
width:100%;margin:5px 0;padding:10px;border:none;border-radius:8px;
background:#334155;color:white;cursor:pointer;transition:0.3s}
.sidebar button:hover{background:#0ea5e9}
.content{margin-left:250px;padding:20px}
.card{
background:white;padding:20px;border-radius:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);margin-bottom:20px}
input,textarea{
width:100%;padding:8px;margin:5px 0 10px;border-radius:8px;border:1px solid #ccc}
textarea{height:60px}
button.save{
background:#0ea5e9;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer}
.status-green{background:#22c55e;color:white;padding:5px 10px;border-radius:20px}
.status-yellow{background:#facc15;color:black;padding:5px 10px;border-radius:20px}
.status-red{background:#ef4444;color:white;padding:5px 10px;border-radius:20px}
.login-box{
width:300px;margin:100px auto;background:white;padding:30px;
border-radius:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.hidden{display:none}
</style>
</head>

<body>

<div id="loginPage" class="login-box">
<h2>Login Audit Radiologi</h2>
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button class="save" onclick="login()">Login</button>
</div>

<div id="app" class="hidden">
<div class="sidebar">
<h2>Audit Radiologi</h2>
<button onclick="showDashboard()">Dashboard</button>
<button onclick="showForm('hand')">Hand Hygiene</button>
<button onclick="showForm('identifikasi')">Identifikasi Pasien</button>
<button onclick="showForm('apd')">APD Radiologi</button>
<button onclick="showForm('thorax')">Mutu Thorax</button>
</div>

<div class="content">
<div id="mainContent"></div>
</div>
</div>

<script>
var firebaseConfig={
databaseURL:"https://audit-radiologi-2026-default-rtdb.asia-southeast1.firebasedatabase.app/"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();
var chartInstance=null;

function login(){
let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="201708073" && pass==="Papamama00"){
document.getElementById("loginPage").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");
showDashboard();
}else{
alert("Login salah");
}
}

function indikator(p){
if(p>=95)return '<span class="status-green">'+p+'%</span>';
if(p>=85)return '<span class="status-yellow">'+p+'%</span>';
return '<span class="status-red">'+p+'%</span>';
}

function showDashboard(){
document.getElementById("mainContent").innerHTML=`
<div class="card">
<h2>Dashboard Audit</h2>
<div id="reminder"></div>
<canvas id="chart"></canvas>
</div>
<div class="card">
<h3>Data Audit</h3>
<div id="dataList"></div>
</div>`;
loadData();
}

function showForm(jenis){
let checklist="";

if(jenis==="hand"){
checklist=`
<label><input type="checkbox" class="chk"> Sebelum kontak pasien</label><br>
<label><input type="checkbox" class="chk"> Sebelum tindakan aseptik</label><br>
<label><input type="checkbox" class="chk"> Setelah terpapar cairan tubuh</label><br>
<label><input type="checkbox" class="chk"> Setelah kontak pasien</label><br>
<label><input type="checkbox" class="chk"> Setelah kontak lingkungan pasien</label><br>`;
}

if(jenis==="identifikasi"){
checklist=`
<label><input type="checkbox" class="chk"> Konfirmasi Nama</label><br>
<label><input type="checkbox" class="chk"> Konfirmasi Tgl Lahir</label><br>
<label><input type="checkbox" class="chk"> Cocok Gelang</label><br>
<label><input type="checkbox" class="chk"> Cocok Permintaan</label><br>`;
}

if(jenis==="apd"){
checklist=`
<label><input type="checkbox" class="chk"> Apron Pb</label><br>
<label><input type="checkbox" class="chk"> Masker</label><br>
<label><input type="checkbox" class="chk"> Sarung Tangan</label><br>
<label><input type="checkbox" class="chk"> Dosimeter</label><br>
<label><input type="checkbox" class="chk"> Shield Tiroid</label><br>`;
}

if(jenis==="thorax"){
checklist=`
<label><input type="checkbox" class="chk"> Inspirasi cukup</label><br>
<label><input type="checkbox" class="chk"> Tidak rotasi</label><br>
<label><input type="checkbox" class="chk"> Scapula keluar</label><br>
<label><input type="checkbox" class="chk"> Exposure optimal</label><br>
<label><input type="checkbox" class="chk"> Marker benar</label><br>`;
}

document.getElementById("mainContent").innerHTML=`
<div class="card">
<h2>Form Audit</h2>

<label>Nama Auditor</label>
<input type="text" id="nama">

<label>Nama Radiografer yang Diaudit</label>
<input type="text" id="radiografer">

<label>Unit</label>
<input type="text" id="unit">

<label>Tanggal</label>
<input type="date" id="tanggal">

<h4>Checklist</h4>
${checklist}

<label>Temuan</label>
<textarea id="temuan"></textarea>

<label>Tindak Lanjut</label>
<textarea id="tindak"></textarea>

<label>Target Penyelesaian</label>
<input type="date" id="target">

<button class="save" onclick="simpanAudit('${jenis}')">Simpan & Verifikasi</button>
</div>`;
}

function simpanAudit(jenis){
let nama=document.getElementById("nama").value;
let radiografer=document.getElementById("radiografer").value;
let unit=document.getElementById("unit").value;
let tanggal=document.getElementById("tanggal").value;
let temuan=document.getElementById("temuan").value;
let tindak=document.getElementById("tindak").value;
let target=document.getElementById("target").value;

let chk=document.querySelectorAll(".chk");
let total=chk.length;
let patuh=0;
chk.forEach(c=>{if(c.checked)patuh++;});
let persen=((patuh/total)*100).toFixed(2);

db.ref("audit/"+jenis).push({
nama,
radiografer,
unit,
tanggal,
total,
patuh,
persentase:persen,
temuan,
tindak_lanjut:tindak,
target,
status:"Tervalidasi",
verifikator:"Ino Hadiwinata, A.Md.Rad",
timestamp:Date.now()
});

alert("Audit tersimpan");
showDashboard();
}

function loadData(){
let list="";
let dataPersen=[];
let dataLabel=[];
let today=new Date().toISOString().split("T")[0];
let adaHariIni=false;

db.ref("audit").once("value",snap=>{
if(!snap.exists()){
document.getElementById("dataList").innerHTML="Belum ada data audit.";
return;
}

snap.forEach(jenis=>{
jenis.forEach(item=>{
let d=item.val();
if(d.tanggal===today)adaHariIni=true;
dataPersen.push(parseFloat(d.persentase));
dataLabel.push(d.tanggal);

let encoded=encodeURIComponent(JSON.stringify(d));

list+=`
<div class="card">
<b>${jenis.key.toUpperCase()}</b><br>
Auditor : ${d.nama}<br>
Radiografer : <b>${d.radiografer || "-"}</b><br>
Tanggal : ${d.tanggal}<br>
${indikator(parseFloat(d.persentase))}<br>
<button onclick="cetakAudit('${encoded}')">Cetak</button>
</div>`;
});
});

document.getElementById("dataList").innerHTML=list;

if(!adaHariIni){
document.getElementById("reminder").innerHTML=
"<h3 style='color:red'>⚠ Belum ada audit hari ini</h3>";
}

if(chartInstance){chartInstance.destroy();}
chartInstance=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:dataLabel,
datasets:[{label:"Persentase Audit",data:dataPersen}]
}
});
});
}

function cetakAudit(encodedData){
let data=JSON.parse(decodeURIComponent(encodedData));

let win=window.open("","","width=800,height=600");
win.document.write(`
<html>
<head>
<title>Cetak Audit</title>
<style>
body{font-family:Arial;padding:30px}
h2{text-align:center}
table{width:100%;border-collapse:collapse;margin-top:20px}
td{padding:8px;border:1px solid #000}
.section{margin-top:20px}
</style>
</head>
<body>
<h2>LEMBAR AUDIT MUTU RADIOLOGI</h2>

<table>
<tr><td>Nama Auditor</td><td>${data.nama}</td></tr>
<tr><td>Nama Radiografer</td><td>${data.radiografer || "-"}</td></tr>
<tr><td>Unit</td><td>${data.unit}</td></tr>
<tr><td>Tanggal</td><td>${data.tanggal}</td></tr>
<tr><td>Persentase</td><td>${data.persentase}%</td></tr>
<tr><td>Status</td><td>${data.status}</td></tr>
<tr><td>Verifikator</td><td>${data.verifikator}</td></tr>
</table>

<div class="section"><h4>Temuan</h4><p>${data.temuan||"-"}</p></div>
<div class="section"><h4>Tindak Lanjut</h4><p>${data.tindak_lanjut||"-"}</p></div>
<div class="section"><h4>Target</h4><p>${data.target||"-"}</p></div>

<br><br>
<table style="border:none">
<tr>
<td style="border:none;text-align:center">
Auditor<br><br><br>( ${data.nama} )
</td>
<td style="border:none;text-align:center">
Koordinator Radiologi<br><br><br>( ${data.verifikator} )
</td>
</tr>
</table>

<script>
window.print();
window.close();
<\/script>

</body>
</html>
`);
win.document.close();
}
</script>

</body>
</html>
